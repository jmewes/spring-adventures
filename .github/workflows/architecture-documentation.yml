name: Architecture Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  publish-architecture-documentation:
    if: startsWith(github.event.pull_request.title, 'docs(arc42):')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile architecture documentation
        run: |
          cd ./doc
          ./compile.sh -w

      - name: Publish HTML documentation to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p /tmp/gh-pages
          
          cp -r doc/build/html/. /tmp/gh-pages/
          
          git fetch origin gh-pages || true
          git checkout --orphan gh-pages
          
          git rm -rf . || true
          cp -r /tmp/gh-pages/html/. .
          
          touch .nojekyll
          
          git add .
          git commit -m "Publish documentation" || echo "No changes to publish"
          git push --force origin gh-pages
