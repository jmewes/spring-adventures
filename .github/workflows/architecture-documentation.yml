name: Architecture Documentation

on:
  push:
    branches:
      - main

jobs:
  publish-architecture-documentation:
    if: startsWith(github.event.head_commit.message, 'docs(arc42):')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile architecture documentation
        run: |
          cd ./doc
          ./compile.sh

      - name: Publish HTML documentation to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout gh-pages || git checkout --orphan gh-pages

          rm -rf doc/build/html
          mkdir -p doc/build/html
          git checkout ${{ github.sha }} -- doc/build/html

          git add doc/build/html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "docs(arc42): publish architecture documentation"
          git push origin gh-pages