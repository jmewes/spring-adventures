name: Architecture Documentation

on:
  push:
    branches:
      - main
#  # Builds in pull request are only needed for debugging the workflow
#  pull_request:
#    branches:
#      - main

jobs:
  publish-architecture-documentation:
    if: startsWith(github.event.pull_request.title, 'docs(arc42):')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compile architecture documentation
        run: |
          cd ./doc
          ./compile.sh

      - name: Publish HTML documentation to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TEMP_DIR=$(mktemp -d)
          
          cp -r doc/build/html/** "$TEMP_DIR"
          
          git fetch origin gh-pages || true
          git checkout --orphan gh-pages
          
          rm -rf ./*
          cp -r "$TEMP_DIR"/** .
          
          touch .nojekyll
          
          git add .
          git commit -m "Publish documentation" || echo "No changes to publish"
          git push --force origin gh-pages
